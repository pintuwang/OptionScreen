name: Fetch Options Data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker (e.g. MSTR)'
        required: true
        default: 'MSTR'
      option_type:
        description: 'Option type'
        required: true
        default: 'call'
        type: choice
        options:
          - call
          - put
      strike:
        description: 'Target strike price (e.g. 400)'
        required: true
        default: '400'
      range:
        description: 'Strike range +/- dollars (e.g. 5)'
        required: true
        default: '5'

  schedule:
    - cron: '*/30 13-21 * * 1-5'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Resolve inputs
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ticker=${{ github.event.inputs.ticker }}"           >> $GITHUB_OUTPUT
            echo "option_type=${{ github.event.inputs.option_type }}" >> $GITHUB_OUTPUT
            echo "strike=${{ github.event.inputs.strike }}"           >> $GITHUB_OUTPUT
            echo "range=${{ github.event.inputs.range }}"             >> $GITHUB_OUTPUT
          else
            python3 - <<'EOF'
          import json, os
          try:
              cfg = json.load(open('data/config.json'))
          except:
              cfg = {'ticker':'MSTR','option_type':'call','strike':'400','range':'5'}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              for k, v in cfg.items():
                  f.write(f"{k}={v}\n")
          EOF
          fi

      - name: Save config for scheduled runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p data
          python3 - <<'EOF'
          import json
          cfg = {
            'ticker':      '${{ steps.cfg.outputs.ticker }}',
            'option_type': '${{ steps.cfg.outputs.option_type }}',
            'strike':      '${{ steps.cfg.outputs.strike }}',
            'range':       '${{ steps.cfg.outputs.range }}'
          }
          json.dump(cfg, open('data/config.json','w'), indent=2)
          EOF

      - name: Fetch options data
        env:
          TICKER:      ${{ steps.cfg.outputs.ticker }}
          OPTION_TYPE: ${{ steps.cfg.outputs.option_type }}
          STRIKE:      ${{ steps.cfg.outputs.strike }}
          RANGE:       ${{ steps.cfg.outputs.range }}
        run: python3 fetch_options.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "options data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
